<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAINEL DO ORGANIZADOR</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 p-4">
    <div class="max-w-xl mx-auto bg-white p-6 rounded-lg shadow-md border-t-4 border-red-600">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-xl font-bold text-red-600">🎛️ Controle da Palestra</h2>
            <button id="btn-reset" class="bg-red-600 text-white text-xs px-2 py-1 rounded font-bold cursor-pointer">Zerar Tudo</button>
        </div>
        
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Selecione a Pergunta:</label>
                <select id="select-p" class="w-full border p-2 rounded bg-gray-50 font-medium"></select>
            </div>
            
            <div class="grid grid-cols-3 gap-2">
                <button id="btn-liberar" class="bg-green-600 text-white p-3 rounded text-xs font-bold cursor-pointer hover:bg-green-700">1. Liberar Pergunta</button>
                <button id="btn-revelar" class="bg-blue-600 text-white p-3 rounded text-xs font-bold cursor-pointer hover:bg-blue-700">2. Mostrar Resposta</button>
                <button id="btn-espera" class="bg-slate-700 text-white p-3 rounded text-xs font-bold cursor-pointer hover:bg-slate-800">3. Tela de Espera</button>
            </div>
            
            <button id="btn-ranking" class="w-full bg-purple-600 text-white p-2 rounded text-sm font-bold cursor-pointer hover:bg-purple-700">🏆 Mostrar Ranking Final</button>
            
            <div class="border-t pt-3">
                <h4 class="text-xs font-bold text-gray-500 uppercase mb-2">Grupos e Status das Respostas:</h4>
                <div id="status-grupos" class="space-y-1 text-sm font-semibold"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // CONFIGURAÇÃO DO CONFIG - INTEGRADA COM SUCESSO
        const firebaseConfig = {
            apiKey: "AIzaSyCS26McgH7tnKts85QiinMAxBnz-cJdLYQ",
            authDomain: "dinamica-quiz-jovens.firebaseapp.com",
            databaseURL: "https://dinamica-quiz-jovens-default-rtdb.firebaseio.com",
            projectId: "dinamica-quiz-jovens",
            storageBucket: "dinamica-quiz-jovens.firebasestorage.app",
            messagingSenderId: "160510201066",
            appId: "1:160510201066:web:301642526d92a9310d1b93"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let idPerguntaAtual = "";

        // Carregar perguntas no select
        onValue(ref(db, 'perguntas'), (snapshot) => {
            const select = document.getElementById('select-p');
            select.innerHTML = '<option value="">-- Escolha a Pergunta --</option>';
            if (snapshot.exists()) {
                snapshot.forEach((child) => {
                    const p = child.val();
                    select.innerHTML += `<option value="${p.id}">${p.enunciado} (${p.pontuacao}pts)</option>`;
                });
            }
        });

        // Monitorar pergunta ativa
        onValue(ref(db, 'status_jogo'), (snapshot) => {
            const s = snapshot.val();
            idPerguntaAtual = s ? s.perguntaAtualId : "";
        });

        // Monitorar grupos e respostas
        onValue(ref(db, 'grupos'), (snapshot) => {
            const painel = document.getElementById('status-grupos');
            painel.innerHTML = "";
            if(!snapshot.exists()) { 
                painel.innerHTML = "<p class='text-gray-400 italic text-xs font-normal'>Nenhum grupo cadastrado ainda.</p>"; 
                return; 
            }
            
            snapshot.forEach((child) => {
                const g = child.val();
                const respondeu = g.respostasEnviadas && g.respostasEnviadas[idPerguntaAtual];
                
                let status = "";
                if (idPerguntaAtual === "") {
                    status = `<span class="text-indigo-600">(${g.pontuacaoTotal || 0} pts)</span>`;
                } else if (respondeu) {
                    status = `<span class="text-green-600 font-bold">🟢 OK!</span>`;
                } else {
                    status = `<span class="text-amber-600 font-bold">🟡 Pendente</span>`;
                }
                
                painel.innerHTML += `
                    <div class='flex justify-between items-center p-2 border border-gray-200 bg-gray-50 rounded shadow-xs'>
                        <span>👥 ${g.nomeGrupo} <small class="text-gray-400 text-[10px] font-normal">(${g.pontuacaoTotal || 0} pts)</small></span>
                        ${status}
                    </div>`;
            });
        });

        // Comandos dos Botões
        document.getElementById('btn-liberar').onclick = () => {
            const id = document.getElementById('select-p').value;
            if(!id) return alert("Selecione uma pergunta primeiro!");
            update(ref(db, 'status_jogo'), { fase: "pergunta_visivel", perguntaAtualId: id, mostrarRanking: false });
        };

        document.getElementById('btn-revelar').onclick = () => {
            update(ref(db, 'status_jogo'), { fase: "resposta_visivel" });
        };

        document.getElementById('btn-espera').onclick = () => {
            update(ref(db, 'status_jogo'), { fase: "aguardando", perguntaAtualId: "", mostrarRanking: false });
        };

        document.getElementById('btn-ranking').onclick = () => {
            update(ref(db, 'status_jogo'), { fase: "ranking_final", mostrarRanking: true });
        };

        document.getElementById('btn-reset').onclick = async () => {
            if(confirm("⚠️ Deseja zerar os grupos e pontuações atuais?")) {
                await remove(ref(db, 'grupos'));
                await set(ref(db, 'status_jogo'), { fase: "forcar_deslogar", perguntaAtualId: "", mostrarRanking: false });
                alert("Placar e salas limpas com sucesso!");
            }
        };
    </script>
</body>
</html>
