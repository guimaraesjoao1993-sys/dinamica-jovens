<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dinâmica Interativa de Jovens</title>
    <!-- Tailwind CSS v4 para estilização moderna e leve -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 font-sans text-gray-800 min-h-screen flex flex-col justify-between">

    <!-- CABEÇALHO GLOBAL -->
    <header class="bg-indigo-600 text-white p-4 shadow-md text-center font-bold text-xl tracking-wide">
        ⚡ DINÂMICA EM TEMPO REAL ⚡
    </header>

    <!-- CONTEÚDO PRINCIPAL -->
    <main class="container mx-auto p-4 flex-grow max-w-xl w-full">
        
        <!-- ================= TELA 1: CADASTRO DO GRUPO ================= -->
        <section id="tela-cadastro" class="hidden bg-white p-6 rounded-lg shadow-md">
            <h2 class="text-2xl font-bold mb-4 text-indigo-600 text-center">Registrar Grupo</h2>
            <div class="mb-4">
                <label class="block font-medium mb-1">Nome do Grupo:</label>
                <input type="text" id="input-nome-grupo" class="w-full border p-2 rounded focus:outline-indigo-500 bg-white" placeholder="Ex: Jovens de Fé">
            </div>
            <div class="mb-4">
                <label class="block font-medium mb-1">Membros (separados por vírgula):</label>
                <textarea id="input-membros" class="w-full border p-2 rounded focus:outline-indigo-500 bg-white" rows="3" placeholder="Ex: Lucas, Mariana, Pedro..."></textarea>
            </div>
            <button id="btn-entrar" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white p-3 rounded font-bold transition cursor-pointer">
                Entrar na Dinâmica
            </button>
        </section>

        <!-- ================= TELA 2: QUIZ E ESPERA ================= -->
        <section id="tela-quiz" class="hidden bg-white p-6 rounded-lg shadow-md text-center">
            <!-- PONTUAÇÃO PRIVADA DO GRUPO -->
            <div id="grupo-info" class="flex justify-between items-center text-sm bg-indigo-50 text-indigo-700 p-3 rounded mb-4 font-semibold">
                <span id="txt-nome-grupo-info">Grupo: --</span>
                <span id="txt-pontos-grupo-info" class="bg-indigo-600 text-white px-2 py-0.5 rounded-full text-xs">0 pts</span>
            </div>
            
            <!-- Estado A: Tela de Espera -->
            <div id="quiz-espera" class="py-8">
                <div class="animate-bounce text-4xl mb-4">⏳</div>
                <p class="text-lg font-medium text-gray-600">Aguardando o organizador liberar a pergunta...</p>
            </div>

            <!-- Estado B: Pergunta Ativa -->
            <div id="quiz-pergunta" class="hidden text-left">
                <span id="pergunta-pontos" class="bg-amber-100 text-amber-800 text-xs font-bold px-2 py-1 rounded"></span>
                <h3 id="pergunta-enunciado" class="text-xl font-bold my-3 text-gray-900"></h3>
                
                <div id="area-resposta" class="space-y-3 my-4"></div>
                
                <button id="btn-enviar-resposta" class="w-full bg-green-600 hover:bg-green-700 text-white p-3 rounded font-bold transition cursor-pointer">
                    Enviar Resposta
                </button>
            </div>

            <!-- Estado C: Feedback Individual e Ranking -->
            <div id="quiz-feedback" class="hidden py-6">
                <div id="feedback-resultado" class="text-2xl font-bold mb-4"></div>
                <div id="painel-ranking" class="mt-6 text-left border-t pt-4 hidden">
                    <h4 class="text-xl font-bold mb-2 text-indigo-700 text-center">🏆 RANKING GERAL 🏆</h4>
                    <ol id="lista-ranking" class="list-decimal list-inside space-y-2 font-medium"></ol>
                </div>
            </div>
        </section>

    </main>

    <!-- RODAPÉ GLOBAL -->
    <footer class="bg-gray-800 text-gray-400 text-xs text-center p-3">
        Desenvolvido para Dinâmicas de Grupo &copy; 2026
    </footer>

    <!-- CONFIGURAÇÃO INTEGRADA COM O SEU BANCO DE DADOS -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, update, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCS26McgH7tnKts85QiinMAxBnz-cJdLYQ",
            authDomain: "dinamica-quiz-jovens.firebaseapp.com",
            databaseURL: "https://dinamica-quiz-jovens-default-rtdb.firebaseio.com",
            projectId: "dinamica-quiz-jovens",
            storageBucket: "dinamica-quiz-jovens.firebasestorage.app",
            messagingSenderId: "160510201066",
            appId: "1:160510201066:web:301642526d92a9310d1b93"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const telaCadastro = document.getElementById('tela-cadastro');
        const telaQuiz = document.getElementById('tela-quiz');

        let perguntaAtivaLocal = null;
        let respostaSelecionadaOuEscrita = "";
        let perguntaJaPontuada = ""; 

        // Controle de Sessão Inteligente
        const idGrupoSalvo = localStorage.getItem('idGrupoLogado');
        if (idGrupoSalvo) {
            get(ref(db, `grupos/${idGrupoSalvo}`)).then((snap) => {
                if (snap.exists()) {
                    telaQuiz.classList.remove('hidden');
                    inicializarFluxoQuiz(idGrupoSalvo);
                } else {
                    localStorage.clear();
                    telaCadastro.classList.remove('hidden');
                }
            }).catch(() => {
                telaCadastro.classList.remove('hidden');
            });
        } else {
            telaCadastro.classList.remove('hidden');
        }

        // --- ENTRADA DO GRUPO ---
        document.getElementById('btn-entrar').addEventListener('click', async () => {
            const nomeGrupo = document.getElementById('input-nome-grupo').value.trim();
            const membros = document.getElementById('input-membros').value.trim();
            
            if(!nomeGrupo) return alert("Por favor, digite o nome do seu grupo!");

            const novoGrupoRef = push(ref(db, 'grupos'));
            await set(novoGrupoRef, { id: novoGrupoRef.key, nomeGrupo, membros, pontuacaoTotal: 0 });

            localStorage.setItem('idGrupoLogado', novoGrupoRef.key);
            localStorage.setItem('nomeGrupoLogado', nomeGrupo);
            location.reload();
        });

        // --- FLUXO DO JOGO EM TEMPO REAL ---
        function inicializarFluxoQuiz(idGrupo) {
            document.getElementById('txt-nome-grupo-info').innerText = `Grupo: ${localStorage.getItem('nomeGrupoLogado')}`;
            
            const areaEspera = document.getElementById('quiz-espera');
            const areaPergunta = document.getElementById('quiz-pergunta');
            const areaFeedback = document.getElementById('quiz-feedback');
            const btnEnviar = document.getElementById('btn-enviar-resposta');

            // Escutar pontuação individual do grupo
            onValue(ref(db, `grupos/${idGrupo}`), (snapshot) => {
                const dadosGrupo = snapshot.val();
                if(dadosGrupo) {
                    document.getElementById('txt-pontos-grupo-info').innerText = `${dadosGrupo.pontuacaoTotal || 0} pts`;
                }
            });

            // Escutar comandos em tempo real vindo do admin.html
            onValue(ref(db, 'status_jogo'), async (snapshot) => {
                const status = snapshot.val();
                if(!status) return;

                // Forçar deslogar se o admin resetar o jogo
                if (status.fase === "forcar_deslogar") {
                    localStorage.clear(); 
                    location.reload(); 
                    return;
                }

                // Modo de Espera (Ampulheta)
                if(status.fase === "aguardando") {
                    mostrarSecao(areaEspera);
                    return;
                }

                // Pergunta Liberada
                if(status.fase === "pergunta_visivel") {
                    const pSnap = await get(ref(db, `perguntas/${status.perguntaAtualId}`));
                    perguntaAtivaLocal = pSnap.val();

                    document.getElementById('pergunta-pontos').innerText = `${perguntaAtivaLocal.pontuacao} Pontos`;
                    document.getElementById('pergunta-enunciado').innerText = perguntaAtivaLocal.enunciado;
                    
                    const areaResp = document.getElementById('area-resposta');
                    areaResp.innerHTML = "";

                    if (respostaSelecionadaOuEscrita === "" || perguntaJaPontuada !== status.perguntaAtualId) {
                        respostaSelecionadaOuEscrita = ""; 
                        btnEnviar.disabled = false;
                        btnEnviar.innerText = "Enviar Resposta";
                        btnEnviar.classList.remove('opacity-50', 'cursor-not-allowed');
                    }

                    if(perguntaAtivaLocal.tipo === 'escrita') {
                        areaResp.innerHTML = `<input type="text" id="resp-escrita" class="w-full border p-3 rounded bg-white focus:outline-indigo-500" placeholder="Digite a resposta do grupo...">`;
                    } else if(perguntaAtivaLocal.tipo === 'selecionada') {
                        perguntaAtivaLocal.opcoes.forEach(opcao => {
                            areaResp.innerHTML += `
                                <button class="w-full text-left border p-3 rounded hover:bg-indigo-50 font-medium btn-opcao transition cursor-pointer bg-white" onclick="window.selecionarOpcaoLocal(this, '${opcao}')">
                                    ${opcao}
                                </button>`;
                        });
                    }
                    mostrarSecao(areaPergunta);
                }

                // Revelação da Resposta Correcta
                if(status.fase === "resposta_visivel" && perguntaAtivaLocal) {
                    mostrarSecao(areaFeedback);
                    const feedbackTexto = document.getElementById('feedback-resultado');

                    if(perguntaAtivaLocal.tipo === 'escrita' && document.getElementById('resp-escrita')) {
                        respostaSelecionadaOuEscrita = document.getElementById('resp-escrita').value;
                    }

                    const acertou = respostaSelecionadaOuEscrita.trim().toLowerCase() === perguntaAtivaLocal.respostaCorreta.trim().toLowerCase();
                    
                    if(acertou) {
                        feedbackTexto.innerHTML = "<span class='text-green-600 font-bold text-3xl block mb-2'>🎉 ACERTARAM!</span><span class='text-sm text-gray-500 font-medium'>Aguarde a próxima pergunta subir...</span>";
                        
                        if(perguntaJaPontuada !== status.perguntaAtualId) {
                            perguntaJaPontuada = status.perguntaAtualId; 
                            const grupoSnap = await get(ref(db, `grupos/${idGrupo}`));
                            if (grupoSnap.exists()) {
                                const pontosAtuais = grupoSnap.val().pontuacaoTotal || 0;
                                const novaPontuacao = pontosAtuais + perguntaAtivaLocal.pontuacao;
                                await update(ref(db, `grupos/${idGrupo}`), { pontuacaoTotal: novaPontuacao });
                            }
                        }
                    } else {
                        feedbackTexto.innerHTML = `<span class='text-red-600 font-bold text-2xl block mb-1'>❌ NÃO FOI DESSA VEZ!</span><br><span class='text-base text-gray-600 font-normal'>A resposta certa era: <strong class="text-indigo-600">${perguntaAtivaLocal.respostaCorreta}</strong></span>`;
                    }
                }

                // Exibição do Ranking Geral
                if(status.mostrarRanking) {
                    mostrarSecao(areaFeedback);
                    document.getElementById('painel-ranking').classList.remove('hidden');
                    
                    onValue(ref(db, 'grupos'), (gSnapshot) => {
                        const lista = document.getElementById('lista-ranking');
                        lista.innerHTML = "";
                        let gruposOrdenados = [];
                        gSnapshot.forEach(c => { gruposOrdenados.push(c.val()); });
                        gruposOrdenados.sort((a,b) => (b.pontuacaoTotal || 0) - (a.pontuacaoTotal || 0));

                        gruposOrdenados.forEach(g => {
                            lista.innerHTML += `<li class="flex justify-between border-b border-gray-100 py-2"><span>👥 ${g.nomeGrupo}</span> <span class="text-indigo-600 font-bold">${g.pontuacaoTotal || 0} pts</span></li>`;
                        });
                    });
                }
            });

            // Enviar Resposta
            btnEnviar.onclick = async () => {
                if(perguntaAtivaLocal.tipo === 'escrita' && document.getElementById('resp-escrita')) {
                    respostaSelecionadaOuEscrita = document.getElementById('resp-escrita').value;
                }
                
                btnEnviar.disabled = true;
                btnEnviar.innerText = "Enviado! Aguardando o palestrante...";
                btnEnviar.classList.add('opacity-50', 'cursor-not-allowed');

                const statusJogoSnap = await get(ref(db, 'status_jogo'));
                const idPerguntaAtual = statusJogoSnap.val().perguntaAtualId;
                
                let updateFlag = {};
                updateFlag[`respostasEnviadas/${idPerguntaAtual}`] = true;
                await update(ref(db, `grupos/${idGrupo}`), updateFlag);
            };
        }

        window.selecionarOpcaoLocal = function(botao, valor) {
            document.querySelectorAll('.btn-opcao').forEach(b => b.classList.remove('bg-indigo-200', 'border-indigo-500'));
            botao.classList.add('bg-indigo-200', 'border-indigo-500');
            respostaSelecionadaOuEscrita = valor;
        };

        function mostrarSecao(secaoAtiva) {
            document.getElementById('quiz-espera').classList.add('hidden');
            document.getElementById('quiz-pergunta').classList.add('hidden');
            document.getElementById('quiz-feedback').classList.add('hidden');
            secaoAtiva.classList.remove('hidden');
        }
    </script>
</body>
</html>
